services:
  db:
    image: postgres:15
    container_name: opsfluence-db
    environment:
      POSTGRES_USER: opsfluence
      POSTGRES_PASSWORD: opsfluence
      POSTGRES_DB: opsfluence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: opsfluence-api
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://opsfluence:opsfluence@db:5432/opsfluence
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data: