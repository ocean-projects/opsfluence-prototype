name: Deploy web to Vercel

# Bypasses Vercel's GitHub App integration entirely — this workflow
# builds the app on GitHub Actions and pushes the prebuilt output to
# Vercel via their CLI. That way even if the Vercel <-> GitHub webhook
# is misconfigured (as we're currently debugging), every push to main
# still produces a fresh deploy with clear logs we control.
#
# Requires three GitHub Actions secrets on the repo:
#   VERCEL_TOKEN       - token from vercel.com/account/tokens (Full Access, long expiry)
#   VERCEL_ORG_ID      - team_7CGnxsF2SXB57IdLmh2BSTyx (from .vercel/project.json)
#   VERCEL_PROJECT_ID  - prj_gSOcBkKEeqnH2vIW7gjqdHj8Z47Y  (from .vercel/project.json)
#
# Add them at github.com/ocean-projects/opsfluence-prototype/settings/secrets/actions

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:  # allows a manual "Run workflow" button from the Actions tab

concurrency:
  group: deploy-prototype-prod
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        # Deploy from inside web/ so Vercel sees a plain Next.js app,
        # no monorepo detection to guess wrong.
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env + project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (using Vercel's build system to match their runtime)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployment URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### Deployed to Vercel :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Direct URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production alias: https://opsfluence-prototype.vercel.app" >> $GITHUB_STEP_SUMMARY
